schedule:
  heading: Schedule
  body: Browse the CAPWIC 2026 Schedule.
  days:
    - name: Friday, March 27, 2026 
      color: capwic-primary
      font: white
      events: 
        - name: Registration
          location: Hallway/Atrium
          time_start: 2:30PM
          time_end: 6:45PM
        - name: AWS 101 Workshop
          location: AB1-3140 Lecture Classroom 
          time_start: 3:00PM
          time_end: 5:00PM
          description:
        - name: Break
          time_start: 5:00PM
          time_end: 5:15PM
        - name: Welcome
          location: AB1-1100 Lecture Classroom / Boeing Auditorium
          time_start: 5:15
          time_end: 5:30
        - name: Dinner
          location: AB1-1100 Lecture Classroom / Boeing Auditorium
          time_start: 5:30
          time_end: 7:00
        - name: Keynote Introduction
          location: AB1-1100 Lecture Classroom / Boeing Auditorium
          time_start: 6:00
          time_end: 6:10
        - name: Keynote
          location: AB1-1100 Lecture Classroom / Boeing Auditorium
          time_start: 6:10
          time_end: 6:55
          description: >
            <p><b>Tools in Your Toolbox: What I've Learned as a Professional Female Computer Scientist</b><br>
            <i>Laurian Vega, Ph.d.</i> Booz Allen Hamilton</p>
        - name: Q&A / Closing Remarks
          location: AB1-1100 Lecture Classroom / Boeing Auditorium
          time_start: 6:50
          time_end: 7:00
    - name: Saturday, March 28, 2026
      color: capwic-primary
      font: white
      events:
        - name: Registration
          location: Hallway/Atrium
          time_start: 7:45AM
          time_end: 4:30PM
        - name: Breakfast
          location: TBD
          time_start: 7:50AM
          time_end: 8:50AM
        - name: Keynote Introduction
          location: AB1-1100 Lecture Classroom / Boeing Auditorium
          time_start: 9:00AM
          time_end: 9:05AM
        - name: Keynote
          location: AB1-1100 Lecture Classroom / Boeing Auditorium
          time_start: 9:05AM
          time_end: 9:50AM
          description: >
            <p><b>Goodbye Imposter, Hello Winner: Overcoming Perceptual Expectations to Reclaim Excellence</b><br>
            <i>Candace Aku</i>, Google Public Sector</p>
        - name: Parallel Sessions
          time_start: 10:00AM
          time_end: 11:00AM
          sessions:
            - location: AB1-1100 Lecture Classroom / Boeing Auditorium
              type: Workshop
              name: Debugging Your Resume
              details: >
                <p><i>Aubrey Baker (Red Van Workshop), Holly Wilsey (Purple Basil Games)</i></p>
                <p><b>Session Chair:</b> Nguyen Ho</p>
            - location: AB1-3130 Lecture Classroom
              type: Technical Talks
              name: Education & Inclusion
              details: >
                <p>Still Here, Still Learning: A Woman's Journey Back to Graduate Computing<br>
                <i>Shareka Robinson (Morgan State University)</i></p>
                <p>Designing the AI-Ready Workforce<br>
                <i>Denise D'Angelo (dynamicD)</i></p>
            - location: AB1-3100 SCALE-UP Classroom
              type: Flash Talks
              name: "Advancing AI Systems: Security, Evaluation, and Human-AI Collaboration"
              details: >
                <p>Methods and Challenges in LLM-Based Vulnerability Detection and Repair<br>
                <i>Fatemeh Vares and Brittany Johnson</i></p>
                <p>AI Assisted Cross-border Cybersecurity Literacy<br>
                <i>Norah Ondus and Sehrish Basir Nizamani</i></p>
                <p>OSMoSIS: Enabling Metacognitive Feedback Reflection in LLMs<br>
                <i>Isaiah Freeman and Joseph Shelton</i></p>
                <p>Pebble<br>
                <i>James Mercer, Rhea Parekh, Nikhita Kuninti and Aleysa Sweeney</i></p>
                <p>Benchmarking and Advancing Generative Models for Calorimeter Shower Simulation<br>
                <i>Farzana Yasmin Ahmad and Geoffrey Fox</i></p>
                <p>Effects of Prompt Writing Training Using the AMERH Framework on the Students' Prompt Quality<br>
                <i>Eman A. M. Amer and Jeannine Eddleton</i></p>
                <p>A Structured Dataset for Analyzing Human Group Motion Across Spatial Formations<br>
                <i>Meklet Berihun</i></p>
                <p><b>Session Chair:</b> Mona Rizvi</p>
            - location: AB1-3120 Breakout Connected Classroom
              type: Research Shorts
              name: "Education, Ethics & Inclusive AI"
              details: >
                <p>From Deficits to Strengths: A Scoping Review on ADHD Adults & Productivity Technology<br>
                <i>Suzanna Yaukey, Anita Komlodi, Ravi Kuber and Andrea Kleinsmith</i></p>
                <p>Equity Responsive AI Learning Systems: A Framework for Personalized Learning and Inclusive Participation<br>
                <i>Shalina Champa, Eshwitha Gali and Jayanth Reddy Bekkem</i></p>
                <p>Ethics and AI in Education: Understanding Public Discourse on Twitter (X)<br>
                <i>Akriti Bagale, Nafisa Mehjabin, Ali Unlu and Aditya Johri</i></p>
                <p>CREA: A Collaborative Multi-Agent Framework for Creative Image Editing and Generation<br>
                <i>Kavana Venkatesh, Connor Dunlop and Pinar Yanardag</i></p>
                <p><b>Session Chair:</b> Mai Dahshan</p>
            - type: Workshop
              name: "Designing Safer AI Agents: Secure-by-Design Patterns for AI Systems"
              details: >
                <p><i>Pavan Reddy (The George Washington University)</i></p>
                <p><b>Session Chair:</b> Mohammed Seyam</p>
            - location: Hallway/Atrium
              type: Posters
              name: "Core AI & Machine Learning Methods"
              details: >
                <p>Comparative Analysis of Knowledge-Guided Few-Shot Brain Tumor Detection<br>
                <i>Okib Islam, Ayomide Bonojo, Joy Muchangi, Fahmi Khalifa and Mahmudur Rahman</i></p>
                <p>Uncertainty-Aware Interfaces Between Neural Predictors and Large Language Models<br>
                <i>Xinyue Zeng</i></p>
                <p>Adaptive Block Diffusion With Cache Reuse and Confidence Calibration<br>
                <i>Farhana Amin</i></p>
                <p>Adaptive Knowledge Retrieval with Graph-Enhanced and Document-Centric RAG<br>
                <i>Melike Yildiz Aktas, Min Zhang, Meenu Ravi and Chang-Tien Lu</i></p>
                <p>Evaluating the Expressibility of Data Encoding Methods for Quantum Machine Learning<br>
                <i>Natalie Lee</i></p>
                <p>Reason Impossible: Can LLMs Forecast Wartime Returns?<br>
                <i>Farzana Yasmin Ahmad, Kazi Noshin and Zakaria Mehrab</i></p>
                <p>Knowledge Triple Filtration for Explainable Question-Answering<br>
                <i>Joanne Varughese and Nicole Yazbeck</i></p>
                <p>SETRL: Verifier-Guided Reinforcement Learning Under Query Budgets for Cross-Mode Generalization in SET<br>
                <i>Michelle Lin</i></p>
                <p>Deep Metric Learning for Ancient Coin Identification<br>
                <i>Dhanshree Atre, Nathan Sprague, Jason Forsyth and Trevor Schonbrun</i></p>
                <p>Improving Automated Coding of News Data: A Machine Learning Approach to News Framing<br>
                <i>Emily Lugos and Mauricio Gruppi</i></p>
                <p>Information Quality Assessment Framework to Design Human-Centered AI Systems for Assistive Technology<br>
                <i>Anuridhi Gupta and Hemant Purohit</i></p>
                <p><b>Session Chair:</b> Jessica Zeitz</p>
        - name: Parallel Sessions
          time_start: 11:10AM
          time_end: 12:10PM
          sessions:
            - location: AB1-1100 Lecture Classroom / Boeing Auditorium
              type: Workshop
              name: Best Practices for Using Gen AI to Manage Cloud Compliance
              details: >
                <p><i>Srinija Desiraju (AWS), Alix Delgado (AWS)</i><br>
                Limited seats available: Registration only event (Workshop registrations starts after CAPWIC registration deadline)</p>
                <p><b>Session Chair:</b> Nguyen Ho</p>
            - location: AB1-3130 Lecture Classroom
              type: Technical Talks
              name: "Human-Centered & Applied AI"
              details: >
                <p>Natural Language as the User Interface: Designing Predictive AI That Actually Gets Used<br>
                <i>Emily Smith (Unaffiliated)</i></p>
                <p>Houston, We Have a Model: Performance Assessment for Mission-Critical AI<br>
                <i>Cheryl Howard (IBM), Peyton Cooper (IBM)</i></p>
                <p><b>Session Chair:</b> Jin-Hee Cho</p>
            - location: AB1-3100 SCALE-UP Classroom
              type: Flash Talks
              name: "Trust, Fairness, and Societal Impact of AI"
              details: >
                <p>Discovering Hidden Bias in AI<br>
                <i>Anne Nyangaga, Alma Ladino and Pam Bogdan</i></p>
                <p>LLM-Guided Input Generation for Causal Fairness Testing<br>
                <i>Sadia Afrin Mim</i></p>
                <p>Data-Driven Exploration of Physiological Factors Perpetuating Bias in Pulse Oximetry Readings for At-Home Use<br>
                <i>Arshnoor Bhutani and Mahi Sanghavi</i></p>
                <p>Gender, Culture, and Privacy<br>
                <i>Khoulood Alharthi and Sehrish Basir Nizamani</i></p>
                <p>A Trust-Aware, Biometrically-Secured Social Network Using Decentralized Identity Protocols and the Analytic Hierarchical Process for Collaboration<br>
                <i>Christopher Parham, Sai Sindhu Tirumalasetty and Joseph Shelton</i></p>
                <p>Understanding State-Level AI Readiness Policy<br>
                <i>Saanvi Shashikiran, Henry Deng, Lisa Singh, Andrea Headley, Aditi Bhardwaj, Julie Dang and Vinuri Dissanayake</i></p>
                <p><b>Session Chair:</b> Mona Rizvi</p>
            - location: AB1-3120 Breakout Connected Classroom
              type: Research Shorts
              name: "Human-Centered Computing & HCI"
              details: >
