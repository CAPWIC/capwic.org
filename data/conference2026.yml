  code: |
    <h3>Registration</h3>
    <p>Registration is open for CAPWIC 2026 at <b> Virginia Tech's Institute for Advanced Computing (IAC)</b> in Alexandria, VA. on <b>March 27-28, 2026</b>.  
    If you are registering individually, please use the link below.  Registration this year is $50, which includes meals, snacks, and events.
    <p class="text-center">
    <a href="https://www.eventbrite.com/e/acm-capital-region-celebration-of-women-in-computing-2026-tickets-1978434840867" target="_blank" rel="noopener noreferrer" class="btn btn-primary">Register at Eventbrite</a>
    </p>
    <h3>Scholarships</h3>
    <p>Scholarships 💰 are available to attend CAPWIC every year! CAPWIC Scholarship Awardees have ranged from first-year students in high school, to senior Ph.D. student in graduate school. If you would like to apply for a scholarship, please fill out the following form before registering.</p>
    <p class="text-center">
    Scholarship applications are closed for CAPWIC 2026
    </p>
    <h3>Lodging</h3>
    <div class="card-deck">
    <div class="card" >
      <div class="card-body">
        <h5 class="card-title">Embassy Suites</h5>
        <h6 class="card-subtitle mb-2 text-muted">by Hilton Alexandria Old Town</h6>
        <p class="card-text">0.2 miles to King Street Metro<br>
        <address>
        Embassy Suites by Hilton Alexandria Old Town<br>
        1900 Diagonal Road<br>
        Alexandria, VA 22314, US<br>
        </address>
        </p>
        <p>Guests may also book reservations by calling 800-362-2779 and reference the code 919</p>
        <a target="_blank" class="btn btn-warning" rel="noopener noreferrer" href="https://book.passkey.com/go/CAPWIC2026">Reserve a Room</a>
        <a target="_blank" class="btn btn-primary" rel="noopener noreferrer" href="https://maps.app.goo.gl/8MoQV18NW6tLxsKTA"><i class="icon ion-ios-navigate"></i> Get Directions</a>
      </div>
    </div>
    <div class="card">
      <div class="card-body">
        <h5 class="card-title">Hilton Arlington</h5>
        <h6 class="card-subtitle mb-2 text-muted">National Landing</h6>
        <p class="card-text">0.4 miles to Crystal City Metro, also Complimentary shuttles from Reagan National<br>
        <address>
        Hilton Arlington National Landing<br>
        2399 Richmond Hwy<br>
        Arlington, VA 22202, US
        </address>
        </p>
        <p></p>
        <a target="_blank" class="btn btn-warning" rel="noopener noreferrer" href="https://book.passkey.com/go/capwic">Reserve a Room</a>
        <a target="_blank" class="btn btn-primary" rel="noopener noreferrer" href="https://maps.app.goo.gl/rrntv9ZCq1Frw8536"><i class="icon ion-ios-navigate"></i> Get Directions</a>
      </div>
    </div>
    <div class="card">
      <div class="card-body">
        <h5 class="card-title">Hampton Inn</h5>
        <h6 class="card-subtitle mb-2 text-muted">Alexandria-Old Town/King St. Metro</h6>
        <p class="card-text">0.4 miles to Crystal City Metro, also Complimentary shuttles from Reagan National<br>
        <address>
        Hilton Arlington National Landing<br>
        1616 King Street<br>
        Alexandria, VA, 22314, US
        </address>
        </p>
        <p>Make reservations online or by calling the hotel directly at 703-299-9900, or 1-800-hampton. <strong>If you call the 800 number, be sure to mention specifically Hampton Inn Old Town/King Street Metro</strong>.</p>
        <p>Guests can make reservations online at Hampton Inn King St. Metro Alexandria Virginia Hotel. After entering your dates, click on the box that says <code>special rates</code>. Then in the box under <code>Group Code</code>, enter the group code <code>CAP</code> and then click the done button, which will take you back to the home page where you can click the blue box that says check rooms and rates.</p>
        <a target="_blank" class="btn btn-danger" rel="noopener noreferrer" href="https://www.hilton.com/en/hotels/wasalhx-hampton-alexandria-old-town-king-st-metro/">Reserve a Room <strong>(see note above)</strong></a>
        <a target="_blank" class="btn btn-primary" rel="noopener noreferrer" href="https://maps.app.goo.gl/CUjnkSh2ct15d6AB7"><i class="icon ion-ios-navigate"></i> Get Directions</a>
      </div>
    </div>
    </div>
  description: |
    <h3>Date</h3>
    <p>March 27-28, 2026</p>
    <h3>Location</h3>
    <p>The event will be held at <a href="https://iac.vt.edu/">Virginia Tech's Institute for Advanced Computing (IAC) in Alexandria, VA</a>.</p>
    <p class="text-right"><iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3860.4263726358877!2d-77.0486469!3d38.837851!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89b7b0d0efaf9c9d%3A0xa9238f8afb1abce1!2s3625%20Potomac%20Ave%2C%20Alexandria%2C%20VA%2022305!5e1!3m2!1sen!2sus!4v1769311886961!5m2!1sen!2sus" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe></p>
  fullwidth: |
    <h3>Parking</h3>
    <figure class="float-right"><a target="_blank" rel="noopener noreferrer" href="/2026/vt-iac-by-core-studio-design.png"><img src="/2026/vt-iac-by-core-studio-design.png" width="300"></a><figcaption style="max-width:300px;"><b>Academic Building One Parking Garage</b><br>
    Access via University Dr<br>
    <b>Hours:</b> No overnight parking allowed. Must be out by 10 p.m. or car will not be accessible until 6 a.m. the following day.</figcaption></figure>
    <p>Parking is $4/hr or $20/day.</p>
    <p>There are two options for parking: the surface lots or the underground garage.</p>
    <ol>
    <li>Surface parking is denoted by the green ellipses in the image, and requires payment via <a target="_blank" rel="noopener noreferrer" href="https://parking.vt.edu/parking/parkmobile.html">ParkMobile</a></li>
    <li>The garage entry is indicated by the yellow arrow, and requires payment via the parking stub Systems:
    <ol><li>Upon entry, you will receive a parking stub in order to pay for your garage parking.</li>
    <li>When exiting you have two options to pay for parking:<ol>
    <li>Pay at the ticket machines located in the P1 and P2 elevator bays.</li>
    <li>Pay as you exit by inserting the ticket stub into the exit gate and paying by card. </li></ol></li></ol>
    <ul>
    <li>Note: to access the garage, vehicles must first drive through the smaller surface lot (upper green ellipse) before reaching the entrance.</li></ul></li></ol>
    
    
